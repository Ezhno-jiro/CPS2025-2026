<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS - Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo"><a href="index.html">CPS</a></div>
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="mobile-menu-btn">☰</label>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="product-details.html">Product Details</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="checkout.html" class="active">Checkout</a></li>
                <li><a href="review.html">Reviews</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="section">
            <div class="container">
                <h2 class="section-title">Checkout</h2>
                <div class="checkout-wrapper">
                    <div class="checkout-form-container">
                        <form action="review.html" method="get">
                            <div class="form-group">
                                <label>Full Name *</label>
                                <input type="text" required>
                            </div>
                            <div class="form-group">
                                <label>Phone Number *</label>
                                <input type="tel" required>
                            </div>
                            <div class="form-group">
                                <label>Address (Myanmar) *</label>
                                <textarea rows="3" required></textarea>
                            </div>
                            <div class="form-group">
                                <label>Email (Optional)</label>
                                <input type="email">
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Place Order</button>
                        </form>
                    </div>
                    <div class="checkout-summary">
                        <h3>Order Summary</h3>
                        <div class="checkout-item"><span>Camping Tent x1</span><span>250,000 MMK</span></div>
                        <div class="checkout-item"><span>Sleeping Bag x2</span><span>170,000 MMK</span></div>
                        <div class="checkout-item total"><strong>Total</strong><strong>420,000 MMK</strong></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-info"><h4>Camping Products Sales (CPS)</h4><p>📍 Yangon, Myanmar | 📞 +95 9 123 456 789</p></div>
            <div class="footer-bottom"><p>&copy; 2025 Camping Products Sales</p></div>
        </div>
    </footer>

</body>
</html>
