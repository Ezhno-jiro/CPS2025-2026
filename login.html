<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS - Login / Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo"><a href="index.html">CPS</a></div>
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="mobile-menu-btn">☰</label>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="product-details.html">Product Details</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="review.html">Reviews</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="section">
            <div class="container">
                <div class="auth-wrapper">
                    <div class="auth-form">
                        <h2>Login</h2>
                        <form id="loginForm" action="index.html" method="get">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" required>
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Login</button>
                        </form>
                        <p class="auth-switch">Don't have an account? <a href="#register">Register here</a></p>
                    </div>

                    <div class="auth-form">
                        <h2>Register</h2>
                        <form id="registerForm" action="index.html" method="get">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" required>
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Register</button>
                        </form>
                        <p class="auth-switch">Already have an account? <a href="#login">Login here</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-info"><h3>Camping Products Sales (CPS)</h3><p>📍 Yangon, Myanmar | 📞 +95 9 123 456 789</p></div>
            <div class="footer-bottom"><p>&copy; 2025 Camping Products Sales</p></div>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
